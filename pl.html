<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Before The Silence</title>
    <style>
        body {
            background-color: #020202;
            color: #c4c4c4;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative;
        }
        .language-switcher {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
        }
        .lang-btn {
            color: #444;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }
        .lang-btn:hover {
            color: #8b0000;
        }
        .lang-btn.active {
            color: #990000;
            text-shadow: 0 0 5px rgba(153, 0, 0, 0.6);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 6px 100%;
            z-index: 3;
            pointer-events: none;
        }
        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }
        .container {
            max-width: 650px;
            padding: 30px;
            z-index: 2;
            position: relative;
            animation: flicker 0.15s infinite;
        }
        h1 {
            font-size: 2.8rem;
            color: #990000;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px #000;
        }
        p {
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #7a7a7a;
            text-shadow: 1px 1px 2px #000;
        }
        .form-container {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid #330000;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
        }
        .placeholder-box {
            border: 1px dashed #550000;
            padding: 25px;
            color: #660000;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="language-switcher">
        <a href="pl.html" class="lang-btn">[ PL ]</a>
        <span class="lang-btn active" style="margin-left: 15px;">[ EN ]</span>
    </div>

    <canvas id="snowCanvas"></canvas>
    <div class="crt-overlay"></div>

    <div class="container">
        <h1>Before the Silence</h1>
        <p>A disturbing psychological retro horror in the style of PS1. Darkness, choking fog, and secrets that were never meant to be uncovered. Demo is coming. Sign up to get a key for the closed playtests.</p>
        
        <div class="form-container">
            <div class="placeholder-box">
                [ PLAYER REGISTRATION SYSTEM - SECURE CONNECTION ]
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        const retroWidth = 320;
        const retroHeight = 240;
        canvas.width = retroWidth;
        canvas.height = retroHeight;
        const numFlakes = 60;
        const flakes = [];
        for (let i = 0; i < numFlakes; i++) {
            flakes.push({
                x: Math.random() * retroWidth,
                y: Math.random() * retroHeight,
                size: Math.random() < 0.2 ? 2 : 1,
                speed: Math.random() * 0.5 + 0.2,
                drift: Math.random() * 0.3 - 0.15
            });
        }
        function draw() {
            ctx.fillStyle = '#020202';
            ctx.fillRect(0, 0, retroWidth, retroHeight);
            ctx.fillStyle = 'rgba(150, 150, 150, 0.75)';
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                ctx.fillRect(Math.floor(f.x), Math.floor(f.y), f.size, f.size);
                f.y += f.speed;
                f.x += f.drift;
                if (f.y > retroHeight) {
                    flakes[i].y = -5;
                    flakes[i].x = Math.random() * retroWidth;
                }
                if (f.x > retroWidth) f.x = 0;
                if (f.x < 0) f.x = retroWidth;
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
